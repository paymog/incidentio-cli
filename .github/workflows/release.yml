name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          mkdir -p dist
          declare -A targets=(
            [bun-darwin-arm64]=incidentio-darwin-arm64
            [bun-darwin-x64]=incidentio-darwin-x64
            [bun-linux-arm64]=incidentio-linux-arm64
            [bun-linux-x64]=incidentio-linux-x64
          )
          for target in "${!targets[@]}"; do
            out="dist/${targets[$target]}"
            bun build ./src/cli.ts --compile --target="$target" --outfile "$out"
          done
          cd dist
          shasum -a 256 incidentio-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/incidentio-* dist/checksums.txt \
            --title "$TAG" --generate-notes \
            || gh release upload "$TAG" dist/incidentio-* dist/checksums.txt --clobber

      - name: Update Homebrew tap
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/paymog/incidentio-cli/releases/download/$TAG"

          sha() { awk -v f="$1" '$2==f {print $1}' dist/checksums.txt; }
          darwin_arm="$(sha incidentio-darwin-arm64)"
          darwin_x64="$(sha incidentio-darwin-x64)"
          linux_arm="$(sha incidentio-linux-arm64)"
          linux_x64="$(sha incidentio-linux-x64)"

          tap_dir="$(mktemp -d)/homebrew-tap"
          key_file="$(mktemp)"
          printf '%s\n' "$DEPLOY_KEY" > "$key_file"
          chmod 600 "$key_file"
          export GIT_SSH_COMMAND="ssh -i $key_file -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          git clone git@github.com:paymog/homebrew-tap.git "$tap_dir"
          mkdir -p "$tap_dir/Formula"
          cat > "$tap_dir/Formula/incidentio.rb" <<EOF
          class Incidentio < Formula
            desc "CLI for the incident.io API (Bearer auth, OpenAPI-generated commands)"
            homepage "https://github.com/paymog/incidentio-cli"
            version "$version"

            on_macos do
              on_arm do
                url "$base/incidentio-darwin-arm64"
                sha256 "$darwin_arm"
              end
              on_intel do
                url "$base/incidentio-darwin-x64"
                sha256 "$darwin_x64"
              end
            end

            on_linux do
              on_arm do
                url "$base/incidentio-linux-arm64"
                sha256 "$linux_arm"
              end
              on_intel do
                url "$base/incidentio-linux-x64"
                sha256 "$linux_x64"
              end
            end

            def install
              bin.install Dir["incidentio-*"].first => "incidentio"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/incidentio --version")
            end
          end
          EOF

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/incidentio.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore: update incidentio to $TAG"
          git push
